    ConnectorInstallationListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ConnectorInstallationSummary'
        meta:
          $ref: '#/components/schemas/ListMeta'

    UpdateQurlRequest:
      type: object
      description: |
        Update a qURL resource. Can extend expiration (via extend_by or expires_at)
        and/or update tags and description. At least one field must be provided.
      properties:
        extend_by:
          type: string
          description: |
            Duration to extend by (e.g., "24h", "7d", "1w").
            Minimum: 1 minute. Maximum: 30 days.
            Mutually exclusive with expires_at.
          example: "7d"
        expires_at:
          type: string
          format: date-time
          description: |
            Absolute expiration time. Mutually exclusive with extend_by.
            Must be in the future and within 30 days from now.
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 50
            pattern: '^[a-zA-Z0-9][a-zA-Z0-9 _-]*$'
          maxItems: 10
          uniqueItems: true
          description: |
            Replace all tags on this resource. Tags are lowercased and trimmed
            server-side. Duplicates are silently removed. Pass an empty array
            to clear all tags.
        description:
          type: string
          maxLength: 500
          description: Replace the resource description. Pass an empty string to clear.

    MintLinkRequest:
      type: object
      description: |
        Optionally provide expires_in (relative) or expires_at (absolute) — not both.
        If neither is specified, defaults to 24 hours from now.
      properties:
        expires_in:
          type: string
          description: |
            Duration until expiration. Supports: minutes (5m), hours (24h), days (7d), weeks (1w).
            Minimum: 1 minute. Maximum: 30 days.
          example: "5m"
        expires_at:
          type: string
          format: date-time
          description: |
            Absolute expiration timestamp. Must be in the future and within 30 days from now.
            Mutually exclusive with expires_in.
        label:
          type: string
          description: Human-readable label identifying who this qURL is for
          maxLength: 500
          example: "Alice from Acme"
        one_time_use:
          type: boolean
          description: Whether this qURL can only be used once
          default: false
        max_sessions:
          type: integer
          description: Maximum concurrent sessions for this qURL token (0 = unlimited)
          minimum: 0
          maximum: 1000
          default: 0
        session_duration:
          type: string
          description: |
            How long access lasts after clicking. Minimum: 1 second.
            Maximum: 24 hours.

            If the parent resource was created with a `session_duration`
            (see `ResourceData.session_duration_cap`), values exceeding
            that cap are rejected with HTTP 400 `invalid_session_duration`.
            Omitting this field on a capped resource inherits the cap;
            on an uncapped resource the token receives the server default.

            New access is denied exactly at `session_duration`; an
            already-established connection may continue receiving
            data for a short window past that point on very short
            values (longer for SSE / WebSocket streams — see the
            canonical block). See `CreateQurlRequest.session_duration`
            → **Timing precision** for the full semantics.
          example: "1h"
        access_policy:
          $ref: '#/components/schemas/AccessPolicy'

    AccessPolicy:
      type: object
      description: Access control policy for the qURL
      x-go-type: domain.AccessPolicy
      x-go-type-import:
        path: github.com/layervai/qurl-service/internal/domain
      properties:
        ip_allowlist:
          type: array
          maxItems: 100
          items:
            type: string
          description: List of allowed IP addresses or CIDR ranges (max 100 entries)
          example: ["192.168.1.0/24", "10.0.0.1"]
        ip_denylist:
          type: array
          maxItems: 100
          items:
            type: string
          description: List of denied IP addresses or CIDR ranges (max 100 entries)
        geo_allowlist:
          type: array
          maxItems: 50
          items:
            type: string
            pattern: '^[A-Z]{2}$'
          description: List of allowed country codes (ISO 3166-1 alpha-2, max 50 entries)
          example: ["US", "CA", "GB"]
        geo_denylist:
          type: array
          maxItems: 50
          items:
            type: string
            pattern: '^[A-Z]{2}$'
          description: List of denied country codes (ISO 3166-1 alpha-2, max 50 entries)
          example: ["CN", "RU"]
        user_agent_allow_regex:
          type: string
          maxLength: 256
          description: Regular expression to allow matching user agents (max 256 characters)
          example: "^Mozilla.*"
        user_agent_deny_regex:
          type: string
          maxLength: 256
          description: Regular expression to deny matching user agents (max 256 characters)
          example: ".*bot.*"
        ai_agent_policy:
          $ref: '#/components/schemas/AIAgentPolicy'

    AIAgentCategory:
      type: string
      description: A well-known AI agent category identifier
      enum:
        - chatgpt
        - gptbot
        - claude
        - gemini
        - perplexity
        - cohere
        - meta
        - bytedance
        - amazon
        - apple
        - commoncrawl
        - mistral
        - generic_ai

    AIAgentPolicy:
      type: object
      x-go-type: domain.AIAgentPolicy
      x-go-type-import:
        path: github.com/layervai/qurl-service/internal/domain
      description: |
        Structured policy for controlling AI agent access.
        Users select well-known categories by name instead of crafting regex patterns.
        The server maintains the user-agent patterns for each category.

        **Important:** This blocks agents that self-identify via their User-Agent header.
        It does not prevent agents that spoof or omit their identity.

        Evaluation order: AI agent policy is evaluated after IP/Geo rules but before
        generic user_agent_deny_regex / user_agent_allow_regex. A bot allowed by this
        policy can still be blocked by user_agent_deny_regex. A bot blocked here cannot
        be rescued by user_agent_allow_regex.

        Common examples:

        Block all AI agents:
          { "block_all": true }

        Block specific crawlers (e.g., GPTBot and Common Crawl) while allowing others:
          { "deny_categories": ["gptbot", "commoncrawl"] }

        Allow only Claude and Perplexity, block all other AI agents:
          { "allow_categories": ["claude", "perplexity"] }

        Block ByteDance and Meta crawlers but allow ChatGPT and Claude:
          { "deny_categories": ["bytedance", "meta"], "allow_categories": ["chatgpt", "claude"] }

        Note: deny always takes precedence over allow. If an agent appears in both lists, it is blocked.
      properties:
        block_all:
          type: boolean
          description: Block all recognized AI agents regardless of category lists
          default: false
        deny_categories:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/AIAgentCategory'
          description: |
            AI agent categories to block. Ignored if block_all is true.
            Deny takes precedence over allow.
          example: ["gptbot", "commoncrawl", "bytedance"]
        allow_categories:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/AIAgentCategory'
          description: |
            AI agent categories to permit. When set, all other AI agents are blocked.
            Deny takes precedence. Ignored if block_all is true.
          example: ["claude", "chatgpt", "perplexity"]

    QurlData:
      type: object
      description: |
        Resource container for a protected URL. The `qurls` array (present on
        single-get responses) is an unordered bounded preview (maximum 100) of
        per-qURL details including access policy and session limits. On list
        responses, only `qurl_count` is populated.
      properties:
        resource_id:
          type: string
          pattern: '^r_[a-z0-9_-]{11}$'
          readOnly: true
          description: Unique resource identifier (generated by server)
        target_url:
          type: string
          format: uri
          description: |
            The protected backend URL. Optional — omitted (field absent
            from the JSON object, NOT serialized as null) when the
            resource is owned by a connector.
        status:
          type: string
          enum: [active, revoked]
          readOnly: true
          description: |
            Current lifecycle status. Computed at response time — resources past
            their expires_at are reported as "expired" even if not explicitly revoked.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: When the qURL was created
        expires_at:
          type: string
          format: date-time
          description: When the qURL expires
        description:
          type: string
          description: Human-readable description
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          description: Tags for categorization and filtering
        qurl_site:
          type: string
          format: uri
          readOnly: true
          description: The qURL site URL for accessing this resource
        custom_domain:
          type: string
          nullable: true
          readOnly: true
          description: Custom domain associated with this qURL
        slug:
          type: string
          readOnly: true
          description: |
            Per-owner immutable identity supplied at create time.
            Echo of the `slug` field on `POST /v1/resources`; omitted
            on resources that were not created with a slug. See
            `ResourceData.slug` for the full description — the field
            carries identical semantics on both response schemas.
        qurl_count:
          type: integer
          readOnly: true
          description: |
            Number of qURL token rows for this resource. Rows revoked or expired
            but still awaiting background TTL cleanup can remain counted until
            cleanup completes. Omitted when qURL count lookup is unavailable or
            qURL fields are suppressed; treat an omitted value as unknown rather
            than zero.
        qurls:
          type: array
          maxItems: 100
          readOnly: true
          description: |
            Unordered bounded preview of per-qURL details (maximum 100).
            Best-effort on single-get and omitted on list, preview lookup failure,
            or redacted resource types. This preview does not imply newest-first
            or any stable ordering and is not active-first; an active qURL can
            be absent from the preview when earlier token rows fill the cap.
            When present, `qurl_count` is the exact total; if omitted, callers
            must treat truncation as unknown. There is
            currently no paginated endpoint for the complete per-resource qURL
            summary list; callers that need the full list should use
            `qurl_count` to detect truncation and track the paginated-list
            follow-up. For large resources, the preview and count are separate
            reads, so concurrent qURL changes can make the preview length and
            `qurl_count` briefly differ.
          items:
            $ref: '#/components/schemas/QurlSummary'

    CreateQurlData:
      type: object
      description: Response data for qURL creation
      properties:
        qurl_id:
          type: string
          pattern: '^q_[a-f0-9]{11}$'
          readOnly: true
          description: |
            Unique qURL identifier (q_ + first 11 hex chars of token hash).
            Used as NHP resource ID and qurl_site subdomain. Each qURL gets
            its own access rules keyed by this ID.
          example: "q_3a7f2c8e91b"
        resource_id:
          type: string
          pattern: '^r_[a-z0-9_-]{11}$'
          readOnly: true
          description: Parent resource ID (auto-created grouping by target URL)
        qurl_link:
          type: string
          format: uri
          readOnly: true
          description: Ephemeral access link (shown once, cannot be recovered)
        branded_domain:
          type: string
          readOnly: true
          description: |
            Customer's bare branded hostname for anchor-text display
            alongside `qurl_link`. See `MintLinkData.branded_domain` for
            the canonical description (rendering pattern,
            `provisioning_tls` caveat, live-status gating). Populated
            when the resource has a `custom_domain` whose status is
            usable; omitted otherwise.

            Note: requests replayed via `Idempotency-Key` return the cached
            response, so `branded_domain` reflects the domain status at
            the time of the original request — not the current status.
            Consumers caching create responses should re-fetch via the
            resource if they need a live usability signal.
        qurl_site:
          type: string
          format: uri
          readOnly: true
          description: Per-qURL site URL (https://{qurl_id}.qurl.site)
        expires_at:
          type: string
          format: date-time
          readOnly: true
        label:
          type: string
          readOnly: true
          description: Human-readable label for this qURL
        # See CreateQurlRequest.type — plain `type: string` (no inline
        # enum, no $ref) so response-validation doesn't reject internal
        # values at the OpenAPI middleware boundary.
        # TestResourceTypeEnumParity guards this surface.
        type:
          type: string
          readOnly: true
          description: Resource type — echoes the type from the create request.
    QurlResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/QurlData'
        meta:
          $ref: '#/components/schemas/Meta'

    CreateQurlResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CreateQurlData'
        meta:
          $ref: '#/components/schemas/Meta'

    ResolveQurlRequest:
      type: object
      required:
        - access_token
      properties:
        access_token:
          type: string
          description: qURL access token (e.g., "at_k8xqp9h2sj9lx7r4abcdef")
          pattern: '^at_[a-z0-9_-]{22}$'
          example: "at_k8xqp9h2sj9lx7r4abcdef"

    ResolveQurlResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ResolveQurlData'
        error:
          $ref: '#/components/schemas/Error'
        meta:
          $ref: '#/components/schemas/Meta'

    ResolveQurlData:
      type: object
      properties:
        target_url:
          type: string
          format: uri
          description: The URL that is now accessible from the caller's IP
          example: "https://api.example.com/data"
        resource_id:
          type: string
          description: qURL resource identifier
          example: "r_k8xqp9h2sj9"
        access_grant:
          $ref: '#/components/schemas/AccessGrant'

    AccessGrant:
      type: object
      description: Details of the network access that was granted
      required:
        - expires_in
        - granted_at
        - src_ip
      properties:
        expires_in:
          type: integer
          description: Seconds until network access expires
          example: 305
        granted_at:
          type: string
          format: date-time
          description: When the access was granted
          example: "2026-03-09T15:30:00Z"
        src_ip:
          type: string
          description: The IP address that was granted access
          example: "203.0.113.42"

    QurlListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/QurlData'
        meta:
          $ref: '#/components/schemas/ListMeta'

    MintLinkData:
      type: object
      properties:
        qurl_id:
          type: string
          pattern: '^q_[a-f0-9]{11}$'
          readOnly: true
          example: "q_a1b2c3d4e5f"
          description: |
            The minted qURL's primary key (prefix `q_`). Same
            identifier as `CreateQurlData.qurl_id`. Webhook subscribers
            receive `qurl.accessed` events keyed on this ID, so callers
            that want to correlate access events back to the
            recipient/context they minted FOR must capture this value
            at mint time.
        qurl_link:
          type: string
          format: uri
          readOnly: true
          description: Single-use access link
        branded_domain:
          type: string
          readOnly: true
          description: |
            Customer's bare branded hostname (e.g. `customer.com`) for
            anchor-text display alongside `qurl_link`. Render as
            `<a href="{qurl_link}">{branded_domain}</a>` — the access
            token lives in `qurl_link`'s fragment, not here, so the
            href must stay `qurl_link`. Populated when the resource has
            a `custom_domain` whose status is usable (`verified`,
            `provisioning_tls`, or `active`) and is owned by the
            requesting tenant; omitted when no custom domain is set,
            when the assigned domain has transitioned to a non-usable
            status, or when the requesting tenant doesn't own the live
            domain row (defends against domain churn — e.g. a domain
            deleted and re-registered by a different tenant). During
            `provisioning_tls` the branded host may not yet be serving
            HTTPS, so treat the value as a display string until the
            domain reaches `active`.
        expires_at:
          type: string
          format: date-time
          readOnly: true
        # See CreateQurlRequest.type — plain `type: string` (no inline
        # enum, no $ref) so response-validation doesn't reject internal
        # values at the OpenAPI middleware boundary.
        # TestResourceTypeEnumParity guards this surface.
        type:
          type: string
          readOnly: true
          description: Resource type — echoes the type of the underlying resource.
    MintLinkResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MintLinkData'
        meta:
          $ref: '#/components/schemas/Meta'

    BatchCreateRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          description: Array of qURL creation requests (1-100 items)
          items:
            $ref: '#/components/schemas/CreateQurlRequest'

    BatchCreateResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            succeeded:
              type: integer
              readOnly: true
              description: Number of successfully created qURLs
            failed:
              type: integer
              readOnly: true
              description: Number of failed creations
            results:
              type: array
              items:
                $ref: '#/components/schemas/BatchItemResult'
        meta:
          $ref: '#/components/schemas/Meta'

    BatchItemResult:
      type: object
      properties:
        index:
          type: integer
          readOnly: true
          description: Original index in the request array
        success:
          type: boolean
          readOnly: true
        resource_id:
          type: string
          readOnly: true
          description: Created resource ID (if success)
        qurl_link:
          type: string
          format: uri
          readOnly: true
          description: Access link (if success)
        branded_domain:
          type: string
          readOnly: true
          description: |
            Customer's bare branded hostname (if success). See
            `MintLinkData.branded_domain` for the canonical description,
            including the `<a href="{qurl_link}">{branded_domain}</a>`
            rendering pattern, the `provisioning_tls` HTTPS-not-yet-live
            caveat, and the live-status + tenant-ownership gating.
        qurl_site:
          type: string
          format: uri
          readOnly: true
          description: qURL site URL (if success)
        expires_at:
          type: string
          format: date-time
          readOnly: true
          description: Expiration time (if success)
        error:
          type: object
          readOnly: true
          properties:
            code:
              type: string
            message:
              type: string
          description: Error details (if failed)

    QuotaData:
      type: object
      properties:
        plan:
          type: string
          enum: [free, growth, enterprise]
          readOnly: true
        period_start:
          type: string
          format: date-time
          readOnly: true
        period_end:
          type: string
          format: date-time
          readOnly: true
        rate_limits:
          type: object
          readOnly: true
          properties:
            create_per_minute:
              type: integer
            create_per_hour:
              type: integer
            list_per_minute:
              type: integer
            resolve_per_minute:
              type: integer
              description: Rate limit for token resolution requests
            max_active_qurls:
              type: integer
              description: Maximum active qURLs allowed (-1 = unlimited)
            max_tokens_per_qurl:
              type: integer
              description: Maximum tokens per qURL (-1 = unlimited)
            max_expiry_seconds:
              type: integer
              description: Maximum expiry duration in seconds (free=259200/3d, growth=2592000/30d, enterprise=2592000/30d)
        usage:
          type: object
          readOnly: true
          properties:
            qurls_created:
              type: integer
              description: Total qURLs created this period
            active_qurls:
              type: integer
              description: Currently active qURLs
            active_qurls_percent:
              type: number
              format: float
              minimum: 0
              maximum: 100
              nullable: true
              description: Percentage of max_active_qurls used (0-100, null if unlimited)
            total_accesses:
              type: integer
              description: Total access attempts this period

    QuotaResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/QuotaData'
        meta:
          $ref: '#/components/schemas/Meta'

    # Usage schemas
    UsageCostEstimate:
      type: object
      required:
        - currency
        - amount_cents
        - description
      properties:
        currency:
          type: string
          description: Currency code (e.g. "usd")
          example: "usd"
        amount_cents:
          type: integer
          description: Cost in cents
          example: 1500
        description:
          type: string
          description: Human-readable breakdown
          example: "150 qURLs x $0.10/qURL"

    UsageCurrentPeriodData:
      type: object
      required:
        - tier
        - period_start
        - period_end
        - qurls_created
        - active_qurls
      properties:
        tier:
          type: string
          enum: [free, growth, enterprise]
          description: Current billing tier
        period_start:
          type: string
          format: date-time
          description: Start of the current billing period (UTC)
        period_end:
          type: string
          format: date-time
          description: End of the current billing period (UTC)
        qurls_created:
          type: integer
          description: Number of qURLs created in this period
        active_qurls:
          type: integer
          description: Number of currently active (non-expired, non-revoked) qURLs
        cost_estimate:
          $ref: '#/components/schemas/UsageCostEstimate'

    UsageCurrentPeriodResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/UsageCurrentPeriodData'
        meta:
          $ref: '#/components/schemas/Meta'

    UsageDailyEntry:
      type: object
      required:
        - date
        - qurls_created
      properties:
        date:
          type: string
          format: date
          description: Calendar date (YYYY-MM-DD)
        qurls_created:
          type: integer
          description: qURLs created on this date

    UsageDailyData:
      type: object
      required:
        - tier
        - period_start
        - period_end
        - daily
      properties:
        tier:
          type: string
          enum: [free, growth, enterprise]
          description: Current billing tier
        period_start:
          type: string
          format: date-time
          description: Start of the current billing period (UTC)
        period_end:
          type: string
          format: date-time
          description: End of the current billing period (UTC)
        daily:
          type: array
          items:
            $ref: '#/components/schemas/UsageDailyEntry'
          description: One entry per day from period_start to today

    UsageDailyResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/UsageDailyData'
        meta:
          $ref: '#/components/schemas/Meta'

    # API Key schemas
    CreateApiKeyRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - scopes
      properties:
        name:
          type: string
          maxLength: 100
          description: Human-readable name for the API key
        scopes:
          type: array
          minItems: 1
          items:
            type: string
            enum: [qurl:read, qurl:write, qurl:resolve, qurl:agent]
          description: Permissions granted to this API key
        expires_in:
          type: string
          pattern: '^[0-9]+[smhdw]$'
          description: >-
            Optional lifetime for restricted tunnel bootstrap keys.
            Defaults to 24h for purpose=tunnel_bootstrap and cannot
            exceed 24h. Invalid format or bounds return 400
            `invalid_duration`; using it without
            purpose=tunnel_bootstrap returns 400 `invalid_input`.
        purpose:
          type: string
          enum: [tunnel_bootstrap]
          description: >-
            Optional constrained key purpose. API-key-authenticated
            callers may only create purpose=tunnel_bootstrap keys.
        tunnel_slug:
          type: string
          pattern: '^[a-z][a-z0-9-]{1,62}[a-z0-9]$'
          description: >-
            Required when purpose=tunnel_bootstrap. The resulting key
            may only bootstrap or find-or-create this tunnel slug.
            Missing or purpose-mismatched values return 400
            `invalid_input`.

    UpdateApiKeyRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          description: Updated name for the API key
        scopes:
          type: array
          minItems: 1
          items:
            type: string
            enum: [qurl:read, qurl:write, qurl:resolve, qurl:agent]
          description: |
            Updated permissions for the API key.
            Omit this field to leave scopes unchanged.
            When provided, replaces all existing scopes (not a merge).

    ApiKeyData:
      type: object
      properties:
        key_id:
          type: string
          pattern: '^key_[A-Za-z0-9]{12}$'
          readOnly: true
        key_prefix:
          type: string
          readOnly: true
          description: >-
            First 12 characters of the key for identification.
            Includes the environment prefix (e.g., "lv_live_a3x9").
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
          description: >-
            Permissions granted to this API key.
            Returned in alphabetical order for deterministic responses.
        status:
          type: string
          enum: [active, revoked]
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: >-
            Timestamp of the last update to name or scopes.
            Omitted if the key has never been updated.
        last_used_at:
          type: string
          format: date-time
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
          description: >-
            Expiration timestamp for restricted or expiring keys.
            Omitted for non-expiring keys.
        purpose:
          type: string
          enum: [tunnel_bootstrap]
          readOnly: true
          description: Optional constrained key purpose.
        tunnel_slug:
          type: string
          readOnly: true
          description: Slug restriction for tunnel bootstrap keys.

    CreateApiKeyData:
      allOf:
        - $ref: '#/components/schemas/ApiKeyData'
        - type: object
          properties:
            api_key:
              type: string
              readOnly: true
              description: |
                The plaintext API key. This is returned only once at creation time.
                Store it securely - it cannot be retrieved again.

    CreateApiKeyResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CreateApiKeyData'
        meta:
          $ref: '#/components/schemas/Meta'

    ApiKeyResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ApiKeyData'
        meta:

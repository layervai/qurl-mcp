          example: 5200

    RedeemAccessCodeData:
      type: object
      properties:
        redirect_url:
          type: string
          format: uri
          readOnly: true
          description: URL to redirect the user to for resource access
          example: "https://qurl.link/#at_k8xqp9h2sj9lx7r4abcdef"

    RedeemAccessCodeResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/RedeemAccessCodeData'

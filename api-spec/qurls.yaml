          type: string
          description: The plaintext access code to redeem
          pattern: '^ac_[a-z0-9_-]{22}$'
          example: "ac_k8xqp9h2sj9lx7r4abcdef"
        honeypot:
          type: string
          description: Honeypot field for bot detection (must be empty)
          default: ""
        elapsed_ms:
          type: integer

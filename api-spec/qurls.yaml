  /v1/api-keys:
    post:
      tags:
        - API Keys
      summary: Create a new API key
      description: |
        Creates a new API key for the authenticated user.
        The plaintext API key is returned only once in the response - store it securely.
        Requires JWT authentication (API keys cannot create API keys).
      operationId: createApiKey
      security:
        - bearerAuth: [qurl:write]
      parameters:
        - $ref: '#/components/parameters/APIKeyMintIdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
            example:
              name: "Production integration"
              scopes: ["qurl:read", "qurl:write"]
      responses:
        '201':
          description: API key created successfully.
          headers:
            Location:
              description: URL of the created API key resource
              schema:
                type: string
                format: uri
                example: "https://api.qurl.link/v1/api-keys/key_abc123def456"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
              example:
                data:
                  key_id: "key_abc123def456"
                  api_key: "lv_live_a3x9Kp2mN8qR5sT7wY0zBcDfGhJkLmNp"
                  key_prefix: "lv_live_a3x9"
                  name: "Production integration"
                  scopes: ["qurl:read", "qurl:write"]
                  status: "active"
                  created_at: "2024-01-08T10:30:00Z"
                meta:
                  request_id: "req_abc123"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            Forbidden. Either:
            - API key auth was used (JWT required for key management), or
            - Plan key limit reached (free: 3, growth: 50). Error code: `api_key_limit`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: |
            The supplied `Idempotency-Key` was previously used with a
            different request body. Send the original body or use a
            fresh key.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          description: |
            Transient failure while processing the idempotent request.
            Retry the same request with the same `Idempotency-Key`.
          headers:
            Retry-After:
              description: Advisory delay before retrying (seconds).
              schema:
                type: integer
                example: 1
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      tags:
        - API Keys
      summary: List API keys
      description: |
        Lists API keys owned by the authenticated user.
        The plaintext API key is never returned in list responses.
        Requires JWT authentication (API keys cannot list API keys).
      operationId: listApiKeys
      security:
        - bearerAuth: [qurl:read]
      parameters:
        - name: limit
          in: query

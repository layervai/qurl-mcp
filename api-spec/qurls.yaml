    Meta:
      type: object
      required:
        - request_id
      properties:
        request_id:
          type: string
          description: Unique request identifier for tracing
        tombstone:
          # Spectral's no-$ref-siblings forbids a description
          # alongside $ref. The referenced TombstoneInfo schema
          # carries the full "present-only-on-410, what-it-means"
          # description in its own description field, so the
          # customer-facing docs render the same copy.
          $ref: '#/components/schemas/TombstoneInfo'

    TombstoneInfo:
      type: object
      description: |
        Read-only metadata for a tombstoned resource. Field-level
        documentation below spells out which resource types each
        field surfaces on.

        **Only present on 410 Gone error responses.** Although
        `Meta.tombstone` is structurally declared on every
        envelope's `Meta`, it is always absent from non-410
        responses — do not branch your client on its presence
        for non-error responses.

        Returned in the `meta.tombstone` field of 410 Gone
        responses on `GET /v1/resources/{id}`,
        `POST /v1/resources/{id}/qurls`, and
        `PATCH /v1/resources/{id}` once the resource's lifecycle
        has closed.

        Tombstoned resources are gated against re-mint and
        will be hard-deleted by the API after a retention
        window (default 90 days). Until hard-delete, this
        metadata remains queryable as the read-only record
        of when the lifecycle closed.
      required:
        - tombstoned_at
      properties:
        tombstoned_at:
          type: string
          format: date-time
          description: When the resource's lifecycle closed.
        final_access_count:
          type: integer
          format: int64
          description: |
            Snapshot of total accesses across all qURLs for this
            resource at tombstone time. **Present only on `url` and
            `tunnel` resources** — for connector-owned (transit)
            rows the count is stripped per the redaction contract,
            since the connector installer is not necessarily the
            uploader and learning "was this viewed" exposes
            sensitive viewer-fact-of-presence about uploads the
            installer didn't make. When present, value is >= 1.
            Absent on `url` / `tunnel` rows means either no
            accesses occurred before closure OR the snapshot was
            not taken — these two cases are indistinguishable on
            the wire by design, since both collapse to the same
            "absent" representation.
      example:
        tombstoned_at: "2026-01-01T00:00:00Z"
        final_access_count: 42

    ListMeta:
      type: object
      required:
        - request_id
      properties:
        request_id:
          type: string
        page_size:
          type: integer
          description: Number of items returned
        has_more:
          type: boolean
          description: Whether more items exist
        next_cursor:
          type: string
          description: Cursor for next page (empty if no more pages)

    Error:
      type: object
      description: |
        Error response following RFC 7807 Problem Details for HTTP APIs.
        See: https://datatracker.ietf.org/doc/html/rfc7807
      required:
        - type
        - title
        - status
        - code
      properties:
        type:
          type: string
          format: uri
          description: |
            URI reference that identifies the problem type (RFC 7807).
            When dereferenced, it should provide human-readable documentation.
          example: "https://api.qurl.link/problems/invalid_request"
        title:
          type: string
          description: |
            Short, human-readable summary of the problem type (RFC 7807).
            This should not change from occurrence to occurrence.
          example: "Invalid Request"
        status:
          type: integer
          description: HTTP status code for this occurrence (RFC 7807).
          example: 400
        detail:
          type: string
          description: |
            Human-readable explanation specific to this occurrence (RFC 7807).
          example: "The target_url field must be a valid HTTPS URL"
        instance:
          type: string
          format: uri-reference
          description: |
            URI reference that identifies the specific occurrence (RFC 7807).
            Typically the request path.
          example: "/v1/qurls"
        code:
          type: string
          description: |
            Machine-readable error code (extension field for backward compatibility).
            Maps to the problem type slug.
          example: "invalid_request"

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            invalid_fields:
              type: object
              additionalProperties:
                type: string
              description: Map of field names to validation error messages
              example:
                target_url: "must be a valid HTTPS URL"
                description: "must not exceed 500 characters"

    ErrorEnvelope:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/Error'
        meta:
          $ref: '#/components/schemas/Meta'

    ValidationErrorEnvelope:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ValidationError'
        meta:
          $ref: '#/components/schemas/Meta'

    AgentBootstrapRequest:
      type: object
      required:
        - public_key
      properties:
        public_key:
          type: string
          description: |
            Agent's X25519 public key, raw 32 bytes encoded as standard
            base64 (RFC 4648 §4 — `+`/`/` alphabet, `=` padding).
          example: "62cFrVBeF1Tl7lUAJ9MNa9lFykVf6D7mNqLaEYggFN0="
          minLength: 44
          maxLength: 44
          # Standard base64 alphabet + single `=` padding (44 chars
          # always ends in exactly one `=` for 32-byte inputs). Moves
          # alphabet validation upstream of the strict-server handler;
          # the service boundary's base64.StdEncoding.Strict() decode
          # remains the load-bearing defense (defense-in-depth).
          pattern: '^[A-Za-z0-9+/]{43}=$'
        agent_id:
          type: string
          description: |
            Optional label correlating this agent across requests
            (matches `LAYERV_AGENT_ID` on the agent). The server
            generates one when omitted.
          minLength: 2
          maxLength: 64
          pattern: '^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$'
          example: "prod-us-east-1"
        hostname:
          type: string
          description: |
            Optional hostname where the agent is running (audit log
            only). If a previous bootstrap recorded a value, omitting
            this field (or sending an empty string) preserves the
            prior value; send a non-empty string to replace it. There
            is no wire shape to clear a previously-set hostname back
            to empty — audit lineage is intentionally append-only.
          maxLength: 253
          example: "agent-7f8c9b-prod-use1"
        version:
          type: string
          description: |
            Optional agent build version (audit log only). Same merge
            behavior as `hostname`: omitting or sending empty preserves
            the prior value; send a non-empty string to replace it.
            Cannot be cleared back to empty (same audit-lineage rule).
          maxLength: 64
          example: "1.4.2"

    AgentBootstrapData:
      type: object
      description: |
        Bootstrap response payload. An agent's registration may
        expire after roughly 90 days of inactivity; long-lived
        agents should re-bootstrap on restart. Re-bootstrapping
        with the same `agent_id` is safe and returns the original
        `registered_at`.
      required:
        - agent_id
        - registered_at
        - nhp_server_peer
      properties:
        agent_id:
          type: string
          description: Label for the agent; echoes the request value, or the server-generated identifier when none was supplied.
        registered_at:
          type: string
          format: date-time
          description: |
            RFC3339 timestamp of the first registration for this
            `agent_id`. Re-bootstraps return the original value, not
            the current time.
        nhp_server_peer:
          $ref: '#/components/schemas/NHPServerPeerInfo'

    NHPServerPeerInfo:
      type: object
      description: |
        Peer info the agent needs to perform its first NHP knock.
      required:
        - public_key_b64
        - host
        - port
        - expire_time
      properties:
        public_key_b64:
          type: string
          description: NHP server X25519 public key, base64-encoded (32 raw bytes).
          minLength: 44
          maxLength: 44
        host:
          type: string
          description: NHP server hostname or IP (no scheme).
          example: "nhp.layerv.ai"
        port:
          type: integer
          minimum: 1
          maximum: 65535
          example: 62206
          description: NHP server UDP port.
        expire_time:
          type: integer
          format: int64
          description: |
            Unix timestamp (seconds) at which this peer entry should be considered stale,
            or 0 for "no client-side expiry".
          example: 0

    AgentBootstrapResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/AgentBootstrapData'
        meta:
          $ref: '#/components/schemas/Meta'

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ValidationErrorEnvelope'
          examples:
            invalidLimit:
              summary: Invalid limit parameter
              value:
                error:
                  type: "https://api.qurl.link/problems/invalid_request"
                  title: "Invalid Request"
                  status: 400
                  detail: "limit must be an integer between 1 and 100"
                  instance: "/v1/qurls"
                  code: "invalid_request"
                meta:
                  request_id: "abc123def456"
            validationError:
              summary: Multiple field validation errors
              value:
                error:
                  type: "https://api.qurl.link/problems/validation_error"
                  title: "Validation Error"
                  status: 400
                  detail: "One or more fields are invalid"
                  instance: "/v1/qurls"
                  code: "validation_error"
                  invalid_fields:
                    target_url: "must be a valid HTTPS URL"
                    expires_in: "must be between 1m and 30d"
                meta:
                  request_id: "abc123def456"

    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: "https://api.qurl.link/problems/invalid_token"
              title: "Invalid Token"
              status: 401
              detail: "Token validation failed"
              instance: "/v1/qurls"
              code: "invalid_token"
            meta:
              request_id: "abc123def456"

    Forbidden:
      description: Insufficient permissions or quota exceeded
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            insufficientScope:
              summary: Missing required scopes
              value:
                error:
                  type: "https://api.qurl.link/problems/insufficient_scope"
                  title: "Insufficient Scope"
                  status: 403
                  detail: "Missing required permissions: qurl:write"
                  instance: "/v1/qurls"
                  code: "insufficient_scope"
                meta:
                  request_id: "abc123def456"
            quotaExceeded:
              summary: Quota limit reached
              value:
                error:
                  type: "https://api.qurl.link/problems/quota_exceeded"
                  title: "Quota Exceeded"
                  status: 403
                  detail: "Active qURL limit reached (10/10)"
                  instance: "/v1/qurls"
                  code: "quota_exceeded"
                meta:
                  request_id: "abc123def456"

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: "https://api.qurl.link/problems/not_found"
              title: "Resource Not Found"
              status: 404
              detail: "qURL not found"
              instance: "/v1/qurls/01ABC123"
              code: "not_found"
            meta:
              request_id: "abc123def456"

    Gone:
      description: Resource is no longer available (consumed, expired, or revoked)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            tokenConsumed:
              summary: Access token already used
              value:
                error:
                  type: "https://api.qurl.link/problems/token_consumed"
                  title: "Token Consumed"
                  status: 410
                  detail: "Access token has already been used"
                  instance: "/v1/resolve"
                  code: "token_consumed"
                meta:
                  request_id: "abc123def456"
            tokenExpired:
              summary: Access token has expired
              value:
                error:
                  type: "https://api.qurl.link/problems/token_expired"
                  title: "Token Expired"
                  status: 410
                  detail: "Access token has expired"
                  instance: "/v1/resolve"
                  code: "token_expired"
                meta:
                  request_id: "abc123def456"

    BadGateway:
      description: Upstream NHP knock failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: "https://api.qurl.link/problems/knock_failed"
              title: "Knock Failed"
              status: 502
              detail: "Failed to grant network access. The token may have been consumed."
              instance: "/v1/resolve"
              code: "knock_failed"
            meta:
              request_id: "abc123def456"

    RateLimitExceeded:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Seconds to wait before retrying
          schema:
            type: integer
        RateLimit-Limit:
          description: Maximum requests allowed
          schema:
            type: integer
        RateLimit-Remaining:
          description: Requests remaining in window
          schema:
            type: integer
        RateLimit-Reset:
          description: Unix timestamp when limit resets
          schema:
            type: integer
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: "https://api.qurl.link/problems/rate_limit_exceeded"
              title: "Rate Limit Exceeded"
              status: 429
              detail: "Too many requests. Please try again later."
              instance: "/v1/qurls"
              code: "rate_limit_exceeded"
            meta:
              request_id: "abc123def456"

    ServiceUnavailable:
      description: Upstream service temporarily unavailable (e.g. Stripe rate limit)
      headers:
        Retry-After:
          description: Seconds to wait before retrying
          schema:
            type: integer
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: "https://api.qurl.link/problems/service_unavailable"
              title: "Service Unavailable"
              status: 503
              detail: "Billing service temporarily unavailable, please retry"
              instance: "/v1/billing/checkout"
              code: "rate_limited"
            meta:
              request_id: "abc123def456"

    InternalServerError:
      description: Internal server error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: "https://api.qurl.link/problems/internal_error"
              title: "Internal Server Error"
              status: 500
              detail: "An unexpected error occurred. Please try again later."
              instance: "/v1/quota"
              code: "internal_error"
            meta:
              request_id: "abc123def456"

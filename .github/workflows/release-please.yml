name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Pin to the tag release-please just pushed so a post-merge
          # commit on `main` can't sneak into the published tarball.
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp-registry:
    # See CLAUDE.md §"MCP Registry" for the why (GITHUB_TOKEN cross-
    # workflow tag-trigger suppression forces this fold-in instead of
    # a separate tag-triggered workflow). Sequencing `needs: publish`
    # keeps the registry from advertising a version that npm rejected
    # and inherits its `release_created` gate via skip-propagation.
    needs: [release-please, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Cheap insurance against an overlap with the manual workflow_dispatch
    # path in publish-mcp-registry.yml; mcp-publisher publish is not
    # idempotent on the same version and would error out noisily.
    concurrency:
      group: mcp-registry-publish
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # github-oidc auth for mcp-publisher
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Publish to MCP Registry
        uses: ./.github/actions/publish-mcp-registry

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp-registry:
    # Folded into this workflow (rather than `on: push: tags:` in
    # publish-mcp-registry.yml) because release-please pushes the tag
    # via GITHUB_TOKEN, and GitHub suppresses cross-workflow tag
    # triggers from GITHUB_TOKEN to prevent recursion. Gating on
    # `release_created` and sequencing after npm `publish` keeps the
    # registry from advertising a version that didn't make it to npm.
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write # github-oidc auth for mcp-publisher
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          version="v1.7.2"
          tarball="mcp-publisher_linux_amd64.tar.gz"
          # Pinned sha256 from upstream registry_1.7.2_checksums.txt — bump
          # alongside the `version` above when upgrading the publisher.
          expected_sha="9a324bab0bc69bf957599d7975b663d7c4169eba2cdc00baf0f589b847e03898"
          url="https://github.com/modelcontextprotocol/registry/releases/download/${version}/${tarball}"
          curl -fsSL --retry 3 --retry-delay 5 "$url" -o /tmp/mcp-publisher.tar.gz
          echo "${expected_sha}  /tmp/mcp-publisher.tar.gz" | sha256sum -c -
          mkdir -p /tmp/mcp-publisher
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp/mcp-publisher
          echo "/tmp/mcp-publisher" >> "$GITHUB_PATH"

      - name: Sanity-check publisher binary
        run: mcp-publisher --help > /dev/null

      - name: Validate server.json
        run: mcp-publisher validate

      - name: Authenticate with GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm test

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: qurl-mcp:ci
      - name: Verify MCP introspection
        run: |
          # Bash command-substitution doesn't trip set -e by default, so an
          # exit-on-error from `docker run` (e.g. timeout 124, killed 137)
          # would otherwise let `out` be set to whatever made it to stdout
          # and the step would limp on until a grep finally failed with a
          # misleading "missing tool" message. Fail at the actual cause.
          set -euo pipefail
          shopt -s inherit_errexit
          # Pipe stderr to a separate file so we can assert the
          # introspection-only warning still prints. The warning is the only
          # signal a misconfigured user gets that they're booting without an
          # API key under the deferred-auth model; silently stripping it
          # should fail CI.
          # `timeout 30s` fails fast with a clear signal if the entrypoint
          # hangs (e.g. an SDK notification-ordering bug) instead of letting
          # the step run to the GitHub Actions default.
          # Probe asserts three things end-to-end:
          #   1. tools/list exposes the full registered surface
          #   2. boot-time stderr warning fires when QURL_API_KEY is unset
          #   3. a tool invocation under introspection-only mode surfaces
          #      the typed missing_api_key error as an isError content
          #      block (not as a JSON-RPC transport error), locking in the
          #      withMissingApiKeyHandler wrapper from tools/_shared.ts
          out=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"list_qurls","arguments":{}}}' \
            | timeout 30s docker run -i --rm qurl-mcp:ci 2>/tmp/mcp-stderr)
          # Match the JSON-RPC `name` field specifically. A loose grep on the
          # tool name alone would pass when the tool only appears in another
          # tool's description (e.g. update_qurl's description mentions
          # extend_qurl), so dropping a tool from registration could go
          # undetected. The MCP SDK emits minified JSON, so the literal
          # "name":"<tool>" substring appears exactly once per registered tool.
          for tool in create_qurl resolve_qurl list_qurls get_qurl delete_qurl extend_qurl update_qurl mint_link batch_create_qurls; do
            echo "$out" | grep -q "\"name\":\"$tool\"" || { echo "tools/list missing $tool (no \"name\":\"$tool\" match)"; echo "$out"; exit 1; }
          done
          grep -q "QURL_API_KEY is not set" /tmp/mcp-stderr || { echo "missing introspection-only warning on stderr"; cat /tmp/mcp-stderr; exit 1; }
          # Assert the tool/call response under no-key surfaces the typed
          # error as content, not as a transport error. The wrapper returns
          # `{ isError: true, content: [{ type: "text", text: "QURL_API_KEY is not set..." }] }`
          # so we look for both markers.
          echo "$out" | grep -q "\"isError\":true" || { echo "tools/call did not return isError content block"; echo "$out"; exit 1; }
          echo "$out" | grep -q "QURL_API_KEY is not set" || { echo "tools/call response missing the actionable error message"; echo "$out"; exit 1; }
          echo "MCP introspection OK; all 9 tools exposed; warning printed; tools/call surfaces missing_api_key as expected"

  ci-status:
    # `name:` is intentionally omitted: the runner-job lookup below filters
    # by `${{ github.job }}` (the YAML key), and the API's `.name` defaults
    # to the key when `name:` is unset. Keeping them auto-aligned avoids a
    # silent deep-link miss if someone renames one but forgets the other.
    needs: [lint, test, docker]
    # GitHub Actions only writes check-runs, but the legacy combined-status
    # API (read by external probes like Glama's MCP catalog) only sees commit
    # statuses. This job mirrors the aggregate result onto the legacy API so
    # `GET /commits/main/status` flips from `pending` to `success`.
    #
    # DO NOT add `ci/aggregate` to branch protection required checks: this
    # job only fires on `push` to `main`, so configuring it as a required PR
    # check would block all PRs from merging (the check would never report).
    # The legacy status exists for external probes (Glama), not for gating.
    #
    # `if: always()` is intentional: even when lint/test/docker fail, we want
    # to mirror `failure`/`error` to the legacy API instead of leaving it
    # stuck at `pending`. `continue-on-error: true` is the complementary
    # safety: a transient gh-api blip on the mirror itself shouldn't redden
    # the workflow when the upstream check-runs (the source of truth) are
    # already authoritative.
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    permissions:
      actions: read
      statuses: write
    steps:
      - name: Set commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          GH_SERVER_URL: ${{ github.server_url }}
        run: |
          # All three jobs always run on push to main today; if any gain a
          # `paths:` filter later, a `skipped` result would falsely report
          # `failure` here. Revisit the skipped→failure mapping at that point.
          # Map cancellations to `error` (the legacy status enum's
          # conventional slot for "didn't run to completion") rather than
          # collapsing them into `failure`.
          if [[ "$LINT_RESULT" == "success" && "$TEST_RESULT" == "success" && "$DOCKER_RESULT" == "success" ]]; then
            STATE="success"
          elif [[ "$LINT_RESULT" == "cancelled" || "$TEST_RESULT" == "cancelled" || "$DOCKER_RESULT" == "cancelled" ]]; then
            STATE="error"
          else
            STATE="failure"
          fi
          # Resolve this job's numeric runner-job id so the legacy status
          # deep-links to the mirror step, not the run summary. The URL
          # needs the numeric id from the API. Self-heal on rename by
          # matching on `${{ github.job }}` (the YAML key) — the job's
          # `name:` is omitted, so the API's `.name` defaults to the key
          # and the two stay aligned automatically.
          # On any lookup miss, fall back to the run-level URL.
          TARGET_URL="$GH_SERVER_URL/$GH_REPO/actions/runs/$GH_RUN_ID"
          JOB_ID=$(gh api \
            "repos/$GH_REPO/actions/runs/$GH_RUN_ID/attempts/$GH_RUN_ATTEMPT/jobs" \
            --jq ".jobs[] | select(.name == \"${{ github.job }}\") | .id" 2>/dev/null \
            | head -n1)
          if [[ -n "$JOB_ID" ]]; then
            TARGET_URL="$GH_SERVER_URL/$GH_REPO/actions/runs/$GH_RUN_ID/job/$JOB_ID"
          fi
          gh api -X POST "repos/$GH_REPO/statuses/$GH_SHA" \
            -f state="$STATE" \
            -f context="ci/aggregate" \
            -f description="lint=$LINT_RESULT test=$TEST_RESULT docker=$DOCKER_RESULT" \
            -f target_url="$TARGET_URL"

  notify:
    name: Notify
    needs: [lint, test, docker]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEST_RESULT: ${{ needs.test.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_SHA: ${{ github.sha }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_ACTOR: ${{ github.actor }}
          GH_EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ -z "$SLACK_WEBHOOK" ]]; then
            echo "SLACK_WEBHOOK_URL not configured, skipping notification"
            exit 0
          fi

          WORKFLOW_URL="${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}"
          SHORT_SHA="${GH_SHA:0:7}"
          COMMIT_URL="${GH_SERVER_URL}/${GH_REPOSITORY}/commit/${GH_SHA}"

          case "$GH_EVENT_NAME" in
            push)
              if echo "$COMMIT_MESSAGE" | head -n1 | grep -q "Merge pull request"; then
                TRIGGER_TEXT="PR merge"
              else
                TRIGGER_TEXT="Push"
              fi
              ;;
            *) TRIGGER_TEXT="$GH_EVENT_NAME" ;;
          esac

          # Overall status: fail if any of lint, test, docker failed
          HEADER="qURL MCP Build"
          if [[ "$TEST_RESULT" == "success" && "$LINT_RESULT" == "success" && "$DOCKER_RESULT" == "success" ]]; then
            COLOR="#36a64f"; EMOJI=":white_check_mark:"; STATUS_TEXT="successful"
          elif [[ "$TEST_RESULT" == "failure" || "$LINT_RESULT" == "failure" || "$DOCKER_RESULT" == "failure" ]]; then
            COLOR="#dc3545"; EMOJI=":x:"; STATUS_TEXT="failed"
          elif [[ "$TEST_RESULT" == "cancelled" || "$LINT_RESULT" == "cancelled" || "$DOCKER_RESULT" == "cancelled" ]]; then
            COLOR="#ffc107"; EMOJI=":warning:"; STATUS_TEXT="cancelled"
          else
            COLOR="#ffc107"; EMOJI=":warning:"; STATUS_TEXT="incomplete"
          fi

          case "$TEST_RESULT" in
            success) TEST_EMOJI=":white_check_mark:" ;;
            failure) TEST_EMOJI=":x:" ;;
            *) TEST_EMOJI=":warning:" ;;
          esac
          case "$LINT_RESULT" in
            success) LINT_EMOJI=":white_check_mark:" ;;
            failure) LINT_EMOJI=":x:" ;;
            *) LINT_EMOJI=":warning:" ;;
          esac
          case "$DOCKER_RESULT" in
            success) DOCKER_EMOJI=":white_check_mark:" ;;
            failure) DOCKER_EMOJI=":x:" ;;
            *) DOCKER_EMOJI=":warning:" ;;
          esac

          FIRST_LINE=$(echo "$COMMIT_MESSAGE" | head -n1 | cut -c1-100)
          FIRST_LINE="${FIRST_LINE:-(no commit message)}"

          PAYLOAD=$(jq -n \
            --arg color "$COLOR" \
            --arg emoji "$EMOJI" \
            --arg header "$HEADER" \
            --arg status "$STATUS_TEXT" \
            --arg branch "$GH_REF_NAME" \
            --arg sha "$SHORT_SHA" \
            --arg trigger "$TRIGGER_TEXT" \
            --arg actor "$GH_ACTOR" \
            --arg test_emoji "$TEST_EMOJI" \
            --arg lint_emoji "$LINT_EMOJI" \
            --arg docker_emoji "$DOCKER_EMOJI" \
            --arg commit "$FIRST_LINE" \
            --arg commit_url "$COMMIT_URL" \
            --arg workflow_url "$WORKFLOW_URL" \
            '{attachments: [{color: $color, blocks: [
              {type: "section", text: {type: "mrkdwn", text: ("\($emoji) *\($header)* \($status)")}},
              {type: "section", fields: [
                {type: "mrkdwn", text: ("*Branch:*\n`\($branch)` (\($sha))")},
                {type: "mrkdwn", text: ("*Trigger:*\n\($trigger) by \($actor)")},
                {type: "mrkdwn", text: ("*Lint:*\n\($lint_emoji)")},
                {type: "mrkdwn", text: ("*Tests:*\n\($test_emoji)")},
                {type: "mrkdwn", text: ("*Docker:*\n\($docker_emoji)")}
              ]},
              {type: "section", text: {type: "mrkdwn", text: ("*Commit:* `\($commit)`")}},
              {type: "context", elements: [
                {type: "mrkdwn", text: ("<\($commit_url)|\($sha)>  |  <\($workflow_url)|View workflow>")}
              ]}
            ]}]}')

          curl -sfS -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Slack notification failed (non-critical)"

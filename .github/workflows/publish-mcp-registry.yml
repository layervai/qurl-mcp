name: Publish to MCP Registry (manual)

# Manual escape hatch for republishing the current main's server.json
# (recovery, registry outage retry). Auto-publish on release lives in
# release-please.yml; see CLAUDE.md §"MCP Registry" for why this is
# workflow_dispatch-only and not tag-triggered.
#
# workflow_dispatch checks out the workflow file's branch (main) by
# default, not the most recent tag — fine for re-publishing the
# current main's server.json. To publish an older release, add
# `inputs.ref` and pass it to actions/checkout.
#
# Selecting a pre-PR-94 branch in the dispatch UI will fail at the
# `uses: ./.github/actions/publish-mcp-registry` step (action didn't
# exist there). That's an acceptable, loud failure mode.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for github-oidc auth

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Shared with the release-please.yml publish-mcp-registry job —
    # prevents a manual republish from racing an in-flight release.
    concurrency:
      group: mcp-registry-publish
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Publish to MCP Registry
        uses: ./.github/actions/publish-mcp-registry
